<!DOCTYPE html>
<html>
<head>
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Counting</title>
   <style>
      h2 {
         text-align: center;
      }
      .btn-container {
         text-align: center;
      }
      button {
         width: 100px;
         height: 50px;
         margin: 5px;
      }
   </style>
</head>

<body>

<a href="#">Project 2</a>

<h2 id="count">0</h2>

<div class="btn-container">
   <button onclick="increase()">+</button>
   <button onclick="decrease()">-</button>
</div>

<script>
let count = 0;

function increase() {
    count++;
    document.getElementById("count").innerHTML = count;
}

function decrease() {
    count--;
    document.getElementById("count").innerHTML = count;
}
</script>

</body>
</html>
